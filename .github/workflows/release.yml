name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: discord-analyzer.exe
            asset: discord-analyzer-windows-x64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: discord-analyzer
            asset: discord-analyzer-macos-intel

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: discord-analyzer
            asset: discord-analyzer-macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: discord-analyzer
            asset: discord-analyzer-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
